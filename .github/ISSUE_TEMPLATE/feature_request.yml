name: "💡 Feature Request"
description: "Suggest a feature for ekklesia.gr"
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe the feature"
      placeholder: "A clear description of what you want"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "Why is this useful?"
      placeholder: "Explain why this would help citizens"
    validations:
      required: true
