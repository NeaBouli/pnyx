name: "🐛 Bug Report"
description: "Report a bug in ekklesia.gr"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      placeholder: "A clear description of what the bug is"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: "1. Go to...\n2. Click on...\n3. See error"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: "Platform"
      options:
        - Web (ekklesia.gr)
        - Android App
        - iOS PWA
    validations:
      required: true
