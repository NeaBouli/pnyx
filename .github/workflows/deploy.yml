name: Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'docs/**'
      - 'packages/crypto/**'
      - 'infra/docker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
            echo "::error::HETZNER_SSH_KEY not set — skip deploy"
            exit 1
          fi

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff HEAD~1 HEAD --name-only 2>/dev/null || echo "all")
          if echo "$CHANGED" | grep -qF "apps/api/"; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE "apps/web/|docs/"; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qF "infra/docker/"; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "infra=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/ekklesia/app
            git pull origin main

            source /opt/ekklesia/.env.production
            export POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB

            CD="docker compose -f infra/docker/docker-compose.prod.yml"

            if [ "${{ steps.changes.outputs.infra }}" = "true" ]; then
              echo "Rebuilding all containers..."
              $CD build && $CD up -d
            else
              if [ "${{ steps.changes.outputs.api }}" = "true" ]; then
                echo "Rebuilding API..."
                $CD build api && $CD up -d api
              fi
              if [ "${{ steps.changes.outputs.web }}" = "true" ]; then
                echo "Rebuilding Web..."
                $CD build web && $CD up -d web
              fi
            fi

            sleep 10
            curl -sf https://api.ekklesia.gr/health || exit 1
            echo "Deploy OK: $(date)"
