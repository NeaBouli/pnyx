name: CI — Ekklesia.gr
# Copyright (c) 2026 Vendetta Labs — MIT License

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Python API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (for PyNaCl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsodium-dev

      - name: Install Python dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        working-directory: apps/api
        env:
          SERVER_SALT: ci-test-salt-not-production
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379
        run: |
          python -m pytest tests/ -v --tb=short

  test-crypto:
    name: Crypto Package Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (for PyNaCl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsodium-dev

      - name: Install crypto dependencies
        run: |
          pip install PyNaCl pytest pytest-asyncio

      - name: Run crypto tests
        working-directory: packages/crypto
        env:
          SERVER_SALT: ci-test-salt-not-production
        run: |
          python -m pytest tests/ -v --tb=short
