name: CI — Ekklesia.gr

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Python API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  backup-context:
    name: Backup Knowledge Context
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Timestamp CLAUDE.md
        run: |
          echo "" >> CLAUDE.md
          echo "## Last CI Verified" >> CLAUDE.md
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" >> CLAUDE.md

      - name: Commit context backup
        run: |
          git config user.email "ci@ekklesia.gr"
          git config user.name "Ekklesia CI"
          git add CLAUDE.md docs/TODO.md docs/reports/
          git diff --staged --quiet || (
            git commit -m "chore(ci): auto-backup context $(date -u '+%Y-%m-%d')" &&
            git push
          )
