name: CI — Ekklesia.gr
# Copyright (c) 2026 Vendetta Labs — MIT License

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-api:
    name: Python API Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (for PyNaCl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsodium-dev

      - name: Install Python dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        working-directory: apps/api
        env:
          SERVER_SALT: ci-test-salt-not-production
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
        run: |
          python -m pytest tests/ -v --tb=short

  test-crypto:
    name: Crypto Package Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (for PyNaCl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsodium-dev

      - name: Install crypto dependencies
        run: |
          pip install PyNaCl pytest pytest-asyncio httpx

      - name: Run crypto tests
        working-directory: packages/crypto
        env:
          SERVER_SALT: ci-test-salt-not-production
        run: |
          python -m pytest tests/ -v --tb=short

  test-clients:
    name: Client ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Web
            path: apps/web
            verify: npm run lint && npm run typecheck && npm test && npm run build
          - name: Dashboard
            path: apps/dashboard
            verify: npm run lint && npm run typecheck && npm run build
          - name: Mobile
            path: apps/mobile
            verify: npm run typecheck && npm test
          - name: Representative
            path: apps/representative
            verify: npm run typecheck
          - name: Crypto-TS
            path: packages/crypto
            verify: npm run typecheck && npm test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Verify ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.verify }}
