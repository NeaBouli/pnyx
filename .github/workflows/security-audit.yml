name: Security Audit

on:
  push:
    branches: [main, master, develop, dev]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check-npm
        run: |
          if [ -f package.json ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
          fi

      - name: npm audit (all workspaces)
        run: |
          failed=0
          while IFS= read -r lockfile; do
            dir="$(dirname "$lockfile")"
            echo "=== npm audit: $dir ==="
            (cd "$dir" && npm audit --audit-level=high) || failed=1
          done < <(find . -maxdepth 3 -name package-lock.json -not -path "*/node_modules/*" | sort)
          exit $failed

      - name: cargo audit (informational — no Rust workspace in pnyx)
        run: |
          # Soft-fail: pnyx has no Rust code. Cargo audit runs only if Cargo.toml found.
          if find . -maxdepth 3 -name "Cargo.toml" -print -quit | grep -q .; then
            cargo install cargo-audit 2>/dev/null || true
            cargo audit || echo "::warning::cargo audit found issues (informational)"
          else
            echo "No Cargo.toml found — skipping"
          fi

      - name: pip audit (all requirements.txt)
        run: |
          pip install pip-audit
          failed=0
          find . -maxdepth 3 -name "requirements.txt" -print | while read req; do
            echo "=== pip-audit: $req ==="
            pip-audit -r "$req" || failed=1
          done
          exit $failed

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
