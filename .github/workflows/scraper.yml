name: Parliament Bill Scraper

# Fetches latest bills from hellenicparliament.gr Open Data API
# and imports them into ekklesia.gr via POST /api/v1/scraper/import.
# Tries GitHub runner source access first. If all runner-side source paths are
# blocked, it validates the canonical Production freshness probe before import.

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.EKKLESIA_ADMIN_KEY }}" ]; then
            echo "::error::EKKLESIA_ADMIN_KEY secret not set"
            exit 1
          fi
          if [ -z "${{ secrets.PARLIAMENT_IMPORT_ATTESTATION_KEY }}" ]; then
            echo "::error::PARLIAMENT_IMPORT_ATTESTATION_KEY secret not set"
            exit 1
          fi

      - name: Fetch bills from hellenicparliament.gr with fallbacks
        env:
          PARLIAMENT_IMPORT_ATTESTATION_KEY: ${{ secrets.PARLIAMENT_IMPORT_ATTESTATION_KEY }}
        run: |
          python3 scripts/parliament_scraper.py \
            --limit 20 \
            --output /tmp/bills.json \
            --fallback-url "https://api.ekklesia.gr/api/v1/scraper/parliament/freshness?limit=20"
          jq length /tmp/bills.json

      - name: Import into ekklesia.gr
        run: |
          COUNT=$(jq length /tmp/bills.json)
          echo "Fetched ${COUNT} bills total"

          # 0 bills means every source path failed. Keep the workflow red so the
          # monitor/operator can see that the fallback chain needs attention.
          if [ "$COUNT" = "0" ]; then
            echo "::error::No dated Parliament bills fetched from any source."
            exit 1
          fi

          echo "Importing ${COUNT} bills..."
          jq -n \
            --arg admin_key "${{ secrets.EKKLESIA_ADMIN_KEY }}" \
            --slurpfile bills /tmp/bills.json \
            '{admin_key: $admin_key, bills: $bills[0][:20]}' \
            > /tmp/payload.json

          RESP=$(curl -fsS --max-time 30 \
            -X POST "https://api.ekklesia.gr/api/v1/scraper/import" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EKKLESIA_ADMIN_KEY }}" \
            --data-binary @/tmp/payload.json)

          echo "Response: $RESP"

          success=$(echo "$RESP" | jq -r '.success // false')
          if [ "$success" != "true" ]; then
            echo "::error::Import endpoint did not return success=true"
            exit 1
          fi

          imported=$(echo "$RESP" | jq -r '.imported // 0')
          skipped=$(echo "$RESP" | jq -r '.skipped // 0')
          updated=$(echo "$RESP" | jq -r '.updated // 0')
          echo "Imported: ${imported}, Updated: ${updated}, Skipped: ${skipped}"
