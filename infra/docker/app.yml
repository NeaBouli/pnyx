## Discourse Launcher Configuration — pnyx.ekklesia.gr
## Deploy path on server: /opt/pnyx-forum/app.yml
## Network: net_ekklesia (shared with ekklesia stack)
## Traefik handles TLS + routing — no exposed ports

templates:
  - "templates/postgres.template.yml"
  - "templates/redis.template.yml"
  - "templates/web.template.yml"
  - "templates/web.ratelimited.template.yml"

## ─── No port publishing — Traefik routes pnyx.ekklesia.gr ───
expose: []

params:
  ## ─── Database (external — shared ekklesia-db) ───
  db_default_text_search_config: "pg_catalog.greek"
  db_shared_buffers: "128MB"

  ## ─── Versions ───
  version: tests-passed

env:
  LC_ALL: el_GR.UTF-8
  LANG: el_GR.UTF-8
  LANGUAGE: el_GR:el

  ## ─── Domain ───
  DISCOURSE_HOSTNAME: pnyx.ekklesia.gr

  ## ─── Behind Traefik — force HTTPS scheme without terminating TLS ───
  DISCOURSE_FORCE_HTTPS: true
  DISCOURSE_SERVE_STATIC_ASSETS: true

  ## ─── External PostgreSQL (ekklesia-db container) ───
  DISCOURSE_DB_HOST: db
  DISCOURSE_DB_PORT: 5432
  DISCOURSE_DB_NAME: pnyx_discourse
  DISCOURSE_DB_USERNAME: discourse_user
  DISCOURSE_DB_PASSWORD: DISCOURSE_DB_PASSWORD

  ## ─── External Redis (ekklesia-redis container, DB=1) ───
  DISCOURSE_REDIS_HOST: redis
  DISCOURSE_REDIS_PORT: 6379
  DISCOURSE_REDIS_DB: 1

  ## ─── Email ───
  DISCOURSE_SMTP_ADDRESS: DISCOURSE_SMTP_HOST
  DISCOURSE_SMTP_PORT: 587
  DISCOURSE_SMTP_USER_NAME: DISCOURSE_SMTP_USER
  DISCOURSE_SMTP_PASSWORD: DISCOURSE_SMTP_PASSWORD
  DISCOURSE_SMTP_ENABLE_START_TLS: true
  DISCOURSE_SMTP_DOMAIN: ekklesia.gr
  DISCOURSE_NOTIFICATION_EMAIL: forum@ekklesia.gr

  ## ─── SSO via ekklesia Identity (DiscourseConnect) ───
  DISCOURSE_ENABLE_DISCOURSE_CONNECT: true
  DISCOURSE_DISCOURSE_CONNECT_URL: https://api.ekklesia.gr/api/v1/sso/discourse/initiate
  DISCOURSE_DISCOURSE_CONNECT_SECRET: DISCOURSE_SSO_SECRET

  ## ─── Site defaults ───
  DISCOURSE_DEFAULT_LOCALE: el
  DISCOURSE_ALLOW_USER_LOCALE: true

  ## ─── Admin (first-run bootstrap) ───
  DISCOURSE_DEVELOPER_EMAILS: DISCOURSE_ADMIN_EMAIL

  ## ─── Memory tuning for CX33 (shared server) ───
  UNICORN_WORKERS: 2
  RUBY_GC_HEAP_GROWTH_MAX_SLOTS: 40000
  RUBY_GC_HEAP_INIT_SLOTS: 400000
  RUBY_GC_HEAP_OLDOBJECT_LIMIT_FACTOR: 1.5

## ─── Persistent storage ───
volumes:
  - volume:
      host: /opt/pnyx-forum/shared/standalone
      guest: /shared/standalone
  - volume:
      host: /opt/pnyx-forum/shared/log/var-log
      guest: /var/log

## ─── Hooks: join net_ekklesia + install plugins ───
hooks:
  after_code:
    - exec:
        cd: $home/plugins
        cmd:
          - git clone https://github.com/discourse/discourse-voting.git
          - git clone https://github.com/discourse/discourse-solved.git

  ## ─── Connect container to net_ekklesia after bootstrap ───
  after_web_config:
    - exec:
        cmd: echo "Container must be connected to net_ekklesia via docker network connect"

## ─── Docker run args: connect to Traefik network ───
docker_args: >-
  --network net_ekklesia
  --label traefik.enable=true
  --label traefik.http.routers.pnyx-forum.rule=Host(`pnyx.ekklesia.gr`)
  --label traefik.http.routers.pnyx-forum.entrypoints=websecure
  --label traefik.http.routers.pnyx-forum.tls.certresolver=letsencrypt
  --label traefik.http.services.pnyx-forum.loadbalancer.server.port=80
  --label traefik.http.middlewares.pnyx-headers.headers.frameDeny=true
  --label traefik.http.middlewares.pnyx-headers.headers.contentTypeNosniff=true
  --label traefik.http.middlewares.pnyx-headers.headers.browserXssFilter=true
  --label traefik.http.middlewares.pnyx-headers.headers.forceSTSHeader=true
  --label traefik.http.middlewares.pnyx-headers.headers.stsSeconds=31536000
  --label traefik.http.middlewares.pnyx-headers.headers.stsIncludeSubdomains=true
  --label traefik.http.middlewares.pnyx-headers.headers.stsPreload=true
  --label traefik.http.routers.pnyx-forum.middlewares=pnyx-headers
  --memory=1536m
  --memory-swap=2g
