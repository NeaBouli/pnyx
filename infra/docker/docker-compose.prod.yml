services:
  db:
    image: postgres:15-alpine
    container_name: ekklesia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ekklesia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ekklesia-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ekklesia
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile.prod
    container_name: ekklesia-api
    restart: unless-stopped
    env_file:
      - /opt/ekklesia/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      ENVIRONMENT: production
    volumes:
      - /opt/ekklesia/arweave-wallet.json:/opt/ekklesia/arweave-wallet.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ekklesia
    labels:
      - traefik.enable=true
      - traefik.http.routers.ekklesia-api.rule=Host(`api.ekklesia.gr`)
      - traefik.http.routers.ekklesia-api.entrypoints=websecure
      - traefik.http.routers.ekklesia-api.tls.certresolver=letsencrypt
      - traefik.http.services.ekklesia-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.api-headers.headers.frameDeny=true
      - traefik.http.middlewares.api-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.api-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.api-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.api-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.api-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.api-headers.headers.stsPreload=true
      - traefik.http.middlewares.api-headers.headers.customResponseHeaders.X-Robots-Tag=noindex
      - traefik.http.routers.ekklesia-api.middlewares=api-headers

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile.prod
    container_name: ekklesia-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.ekklesia.gr
      NODE_ENV: production
    networks:
      - ekklesia
    labels:
      - traefik.enable=true
      - traefik.http.routers.ekklesia-web.rule=Host(`ekklesia.gr`) || Host(`www.ekklesia.gr`)
      - traefik.http.routers.ekklesia-web.entrypoints=websecure
      - traefik.http.routers.ekklesia-web.tls.certresolver=letsencrypt
      - traefik.http.services.ekklesia-web.loadbalancer.server.port=3000
      - traefik.http.middlewares.ekklesia-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.ekklesia-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.ekklesia-headers.headers.stsPreload=true
      - traefik.http.middlewares.ekklesia-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.ekklesia-headers.headers.frameDeny=true
      - traefik.http.middlewares.ekklesia-headers.headers.browserXssFilter=true
      - "traefik.http.middlewares.ekklesia-headers.headers.contentSecurityPolicy=default-src 'self' https://api.ekklesia.gr https://donate.stripe.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.ekklesia.gr https://api.coingecko.com https://arweave.net https://api.github.com; frame-ancestors 'none'"
      - traefik.http.routers.ekklesia-web.middlewares=ekklesia-headers

  ollama:
    image: ollama/ollama:latest
    container_name: ekklesia-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ekklesia
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    external: true
    name: volumes_ekklesia_postgres
  redis-data:
    external: true
    name: volumes_ekklesia_redis
  ollama-data:
    external: true
    name: volumes_ekklesia_ollama

networks:
  ekklesia:
    external: true
    name: net_ekklesia
  traefik-public:
    external: true
