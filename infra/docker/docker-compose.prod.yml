services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - ekklesia

  db:
    image: postgres:15-alpine
    container_name: ekklesia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ekklesia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ekklesia-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ekklesia
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile.prod
    container_name: ekklesia-api
    restart: unless-stopped
    # env_file injects secrets verbatim (no YAML variable interpolation — safe
    # for secrets that contain '$' characters such as the HLR API_SECRET)
    env_file:
      - /opt/ekklesia/.env.production
    environment:
      # Composed / fixed values stay here because they reference other vars
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      ENVIRONMENT: production
    volumes:
      - /opt/ekklesia/arweave-wallet.json:/opt/ekklesia/arweave-wallet.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ekklesia
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.api.rule=Host(`api.ekklesia.gr`)'
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile.prod
    container_name: ekklesia-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.ekklesia.gr
      NODE_ENV: production
    networks:
      - ekklesia
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.web.rule=Host(`ekklesia.gr`) || Host(`www.ekklesia.gr`)'
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  ollama:
    image: ollama/ollama:latest
    container_name: ekklesia-ollama
    profiles: ["ollama"]          # ADR-001: does not start by default on CX33 (RAM budget)
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ekklesia
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    external: true
    name: volumes_ekklesia_postgres
  redis-data:
    external: true
    name: volumes_ekklesia_redis
  traefik-letsencrypt:
    external: true
    name: volumes_ekklesia_traefik
  ollama-data:
    external: true
    name: volumes_ekklesia_ollama

networks:
  ekklesia:
    external: true
    name: net_ekklesia
