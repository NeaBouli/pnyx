server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"ekklesia-sandbox-mirror","mode":"read-only"}';
    }

    location = /mirror-status.json {
        default_type application/json;
        return 200 '{"status":"online","role":"sandbox-read-only-mirror","source":"https://ekklesia.gr","votes":"redirect-only"}';
    }

    location ^~ /api/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        proxy_pass https://api.ekklesia.gr/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.ekklesia.gr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        proxy_send_timeout 10;
    }

    location = /vote {
        return 302 https://ekklesia.gr/;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
