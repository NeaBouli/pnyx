<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ψηφοφορίες — Demo Node</title>
<meta name="robots" content="noindex">
<style>
:root{--blue:#2563eb;--blue-l:#eff6ff;--dark:#0f172a;--gray-700:#334155;--gray-400:#94a3b8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#7c3aed;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:var(--dark)}
.demo-banner{background:#fef3c7;border-bottom:2px solid var(--yellow);padding:8px 16px;text-align:center;font-size:13px;font-weight:700;color:#92400e;position:sticky;top:0;z-index:100}
nav{background:rgba(255,255,255,0.97);border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.1rem;font-weight:900;color:var(--blue);text-decoration:none}
.nav-links a{padding:6px 12px;border-radius:6px;color:var(--gray-700);text-decoration:none;font-size:13px;font-weight:600;margin-left:4px}
.nav-links a:hover,.nav-links a.active{background:var(--blue-l);color:var(--blue)}
.content{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.4rem;font-weight:900;margin-bottom:4px}
.sub{color:var(--gray-400);font-size:13px;margin-bottom:20px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:8px 16px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:#f1f5f9;color:var(--gray-700);transition:all 0.2s}
.filter-btn.active{background:var(--blue);color:#fff}
.bill-card{background:#fff;border:2px solid #e2e8f0;border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color 0.2s}
.bill-card:hover{border-color:var(--blue)}
.bill-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px}
.bill-id{font-size:12px;color:var(--gray-400);font-family:monospace}
.bill-title{font-size:16px;font-weight:800;margin-bottom:6px;color:var(--dark)}
.bill-pill{font-size:13px;color:var(--gray-700);margin-bottom:12px}
.bar-wrap{background:#f1f5f9;border-radius:8px;height:28px;display:flex;overflow:hidden;margin:10px 0}
.bar-yes{background:var(--green);height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:25px}
.bar-no{background:var(--red);height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:25px}
.bar-abs{background:var(--gray-400);height:100%;min-width:15px}
.votes-info{font-size:12px;color:var(--gray-400);text-align:center;margin:6px 0}
.vote-buttons{display:flex;gap:10px;margin:14px 0}
.vote-btn{flex:1;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:800;cursor:pointer;transition:opacity 0.2s;color:#fff}
.vote-btn:hover{opacity:0.85}
.vote-btn.yes{background:var(--green)}.vote-btn.no{background:var(--red)}.vote-btn.abs{background:var(--gray-400)}
.voted-msg{text-align:center;padding:12px;background:#dcfce7;border-radius:var(--radius);font-size:13px;font-weight:700;color:#166534;margin:14px 0}
.info-hint{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin:10px 0}
.arweave-badge{display:inline-block;padding:4px 12px;background:#ede9fe;border:1px solid #a855f7;border-radius:8px;font-size:12px;font-weight:700;color:var(--purple);margin-top:8px;cursor:default}
.consensus-wrap{background:#faf5ff;border:1px solid #a855f7;border-radius:var(--radius);padding:16px;margin:14px 0}
.consensus-wrap h4{color:var(--purple);font-size:14px;margin-bottom:8px}
.consensus-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--gray-400)}
.consensus-score{text-align:center;font-size:24px;font-weight:900;margin:8px 0}
.consensus-btn{width:100%;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:8px}
.categories{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cat-tag{padding:2px 8px;background:#f1f5f9;border-radius:6px;font-size:11px;color:var(--gray-400)}
footer{background:var(--dark);color:var(--gray-400);padding:20px;text-align:center;font-size:12px;margin-top:40px}
footer a{color:var(--gray-400);text-decoration:none}
</style>
</head>
<body>
<div class="demo-banner">⚠️ Demo Node — Αυτές δεν είναι πραγματικές ψηφοφορίες. Τα δεδομένα είναι εικονικά.</div>

<nav>
  <a href="index.html" class="logo">εκκλησία <span style="font-size:0.5em;color:var(--gray-400)">Demo Node</span></a>
  <div class="nav-links">
    <a href="index.html">Αρχική</a>
    <a href="bills.html" class="active">Ψηφοφορίες</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<div class="content">
  <h1>Δημοτικές Ψηφοφορίες</h1>
  <p class="sub">Ψηφίστε ανώνυμα για τα θέματα του Δήμου σας — Demo περιβάλλον</p>

  <div class="filters" id="filters"></div>
  <div id="billsList"></div>
</div>

<footer>εκκλησία — Demo Node · © 2026 V-Labs Development · MIT License</footer>

<script src="demo-data.js"></script>
<script>
var currentFilter = "ALL";
var filters = [
  {key:"ALL", label:"Όλα"},
  {key:"ACTIVE", label:"Ενεργά"},
  {key:"WINDOW_24H", label:"24ω"},
  {key:"OPEN_END", label:"Αρχείο"},
  {key:"ANNOUNCED", label:"Ανακοινώθηκε"}
];

function renderFilters() {
  var html = "";
  filters.forEach(function(f) {
    html += '<button class="filter-btn' + (currentFilter === f.key ? ' active' : '') + '" onclick="setFilter(\'' + f.key + '\')">' + f.label + ' (' + (f.key === "ALL" ? DEMO_BILLS.length : DEMO_BILLS.filter(function(b){return b.status===f.key}).length) + ')</button>';
  });
  document.getElementById("filters").innerHTML = html;
}

function setFilter(f) { currentFilter = f; renderFilters(); renderBills(); }

function renderBills() {
  var bills = currentFilter === "ALL" ? DEMO_BILLS : DEMO_BILLS.filter(function(b) { return b.status === currentFilter; });
  var html = "";
  bills.forEach(function(b) {
    var s = DEMO_STATUS[b.status] || DEMO_STATUS.ACTIVE;
    var total = b.total_votes || 1;
    var yesPct = Math.round(b.yes_count / total * 100);
    var noPct = Math.round(b.no_count / total * 100);
    var absPct = 100 - yesPct - noPct;
    var userVote = demoGetVote(b.id);
    var votable = b.status === "ACTIVE" || b.status === "WINDOW_24H" || b.status === "OPEN_END";

    html += '<div class="bill-card">';
    html += '<div class="bill-header"><span class="badge" style="background:' + s.bg + ';color:' + s.color + '">' + s.el + '</span><span class="bill-id">' + b.id + '</span></div>';
    html += '<div class="bill-title">' + b.title_el + '</div>';
    if (b.pill_el) html += '<div class="bill-pill">' + b.pill_el + '</div>';
    if (b.categories) { html += '<div class="categories">'; b.categories.forEach(function(c) { html += '<span class="cat-tag">' + c + '</span>'; }); html += '</div>'; }

    // Results bar
    if (b.total_votes > 0) {
      html += '<div class="bar-wrap"><div class="bar-yes" style="width:' + Math.max(yesPct,3) + '%">' + yesPct + '%</div><div class="bar-no" style="width:' + Math.max(noPct,3) + '%">' + noPct + '%</div>' + (absPct > 2 ? '<div class="bar-abs" style="width:' + absPct + '%"></div>' : '') + '</div>';
      html += '<div class="votes-info">' + b.total_votes.toLocaleString() + ' ψήφοι · ΝΑΙ ' + b.yes_count + ' · ΟΧΙ ' + b.no_count + ' · ΑΠΟΧΗ ' + b.abstain_count + '</div>';
    }

    // Vote buttons or voted message
    if (votable && !userVote) {
      html += '<div class="vote-buttons">';
      html += '<button class="vote-btn yes" onclick="castVote(\'' + b.id + '\',\'YES\')">ΝΑΙ</button>';
      html += '<button class="vote-btn no" onclick="castVote(\'' + b.id + '\',\'NO\')">ΟΧΙ</button>';
      html += '<button class="vote-btn abs" onclick="castVote(\'' + b.id + '\',\'ABSTAIN\')">ΑΠΟΧΗ</button>';
      html += '</div>';
      html += '<div class="info-hint">ℹ️ Σε μια πραγματική node, η ψήφος υπογράφεται κρυπτογραφικά με Ed25519 και αποστέλλεται ανώνυμα στον server.</div>';
    } else if (userVote) {
      html += '<div class="voted-msg">✅ Έχετε ψηφίσει: ' + userVote + ' (demo — αποθηκευμένο τοπικά)</div>';
    }

    // Consensus slider for OPEN_END
    if (b.status === "OPEN_END") {
      var userCons = demoGetConsensus(b.id);
      html += '<div class="consensus-wrap"><h4>⚖️ Κλίμακα Συναίνεσης</h4>';
      if (b.consensus_score !== null) {
        html += '<div class="votes-info">Τρέχον σκορ: ' + (b.consensus_score > 0 ? '+' : '') + b.consensus_score.toFixed(1) + ' (' + b.consensus_count + ' ψήφοι)</div>';
      }
      if (!userCons) {
        html += '<div class="consensus-labels"><span>Αντίσταση -5</span><span>Ουδέτερο</span><span>Συναίνεση +5</span></div>';
        html += '<input type="range" min="-5" max="5" value="0" step="1" id="slider_' + b.id + '" style="width:100%;margin:8px 0" oninput="document.getElementById(\'sv_' + b.id + '\').textContent=this.value>0?\'+\'+this.value:this.value">';
        html += '<div class="consensus-score" id="sv_' + b.id + '">0</div>';
        html += '<button class="consensus-btn" onclick="castConsensus(\'' + b.id + '\')">Υποβολή Βαθμολογίας</button>';
        html += '<div class="info-hint">ℹ️ Η κλίμακα συναίνεσης επιτρέπει στους πολίτες να εκφράσουν πόσο συμφωνούν με την απόφαση μετά την ψηφοφορία.</div>';
      } else {
        html += '<div class="voted-msg">⚖️ Βαθμολογία: ' + (userCons > 0 ? '+' : '') + userCons + ' (demo)</div>';
      }
      html += '</div>';
    }

    // Arweave
    if (b.arweave_tx_id) {
      html += '<div class="arweave-badge" title="Demo — Σε πραγματική node αυτό θα ήταν σύνδεσμος στο Arweave blockchain">⛓ Arweave: ' + b.arweave_tx_id.substring(0, 16) + '… (demo)</div>';
      html += '<div class="info-hint">ℹ️ Σε πραγματική node, αυτός ο σύνδεσμος οδηγεί στο Arweave blockchain όπου τα αποτελέσματα είναι μόνιμα αποθηκευμένα.</div>';
    }

    html += '</div>';
  });
  document.getElementById("billsList").innerHTML = html || '<p style="color:var(--gray-400);text-align:center;padding:40px">Δεν βρέθηκαν ψηφοφορίες σε αυτό το φίλτρο</p>';
}

function castVote(billId, choice) {
  demoSetVote(billId, choice);
  renderBills();
}

function castConsensus(billId) {
  var val = document.getElementById("slider_" + billId).value;
  demoSetConsensus(billId, val);
  renderBills();
}

renderFilters();
renderBills();
</script>
</body>
</html>
