<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="hero-net-desc">
  <desc id="hero-net-desc">Static civic landscape background for ekklesia.gr landing page.</desc>
  <style>
    .hill { fill: rgba(37,99,235,0.05); stroke: rgba(37,99,235,0.10); stroke-width: 1.2; }
    .line { fill:none; stroke: rgba(37,99,235,0.18); stroke-width:1.15; stroke-dasharray: 4 12;  }
    .line.green { stroke: rgba(34,197,94,0.18);  }
    .node { fill: #93c5fd; opacity:.28;  transform-origin:center; }
    .node.green { fill: #86efac; opacity:.30;  }
    .node.muted { fill: #94a3b8; opacity:.20;  }
    .ring { fill:none; stroke: rgba(37,99,235,0.12); stroke-width:1; opacity:.5;  }
    @media (prefers-reduced-motion: reduce) { .line,.node,.ring{ animation:none!important; } }
  </style>
