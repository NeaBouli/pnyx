<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">Democratic bill lifecycle ring</title>
  <desc id="desc">Animated ring showing the democratic lifecycle from announcement to parliament decision and open-end archive.</desc>
  <style>
    :root { --ekk-surface:#111827; --ekk-card:#172033; --ekk-text:#f8fafc; --ekk-muted:#94a3b8; --ekk-accent:#c9a227; --ekk-accent-2:#38bdf8; --ekk-good:#22c55e; --ekk-warn:#f59e0b; }
    .panel{ fill:color-mix(in srgb,var(--ekk-surface) 92%,transparent); stroke:color-mix(in srgb,var(--ekk-muted) 24%,transparent); }
    .ring-base{ fill:none; stroke:color-mix(in srgb,var(--ekk-muted) 22%,transparent); stroke-width:22; }
    .ring-active{ fill:none; stroke:var(--ekk-accent); stroke-width:22; stroke-linecap:round; stroke-dasharray: 94 486; animation: sweep 12s ease-in-out infinite; transform-origin:450px 360px; }
    .node{ fill:var(--ekk-card); stroke:color-mix(in srgb,var(--ekk-accent) 56%,transparent); stroke-width:2; }
    .node-core{ fill:var(--ekk-accent); animation: nodePulse 12s ease-in-out infinite; transform-origin:center; }
    .n2{ animation-delay:2s}.n3{ animation-delay:4s}.n4{ animation-delay:6s}.n5{ animation-delay:8s}.n6{ animation-delay:10s}
    .label{ fill:var(--ekk-text); font:700 18px Inter,ui-sans-serif,system-ui,sans-serif; text-anchor:middle; }
    .small{ fill:var(--ekk-muted); font:500 13px Inter,ui-sans-serif,system-ui,sans-serif; text-anchor:middle; }
    .title{ fill:var(--ekk-text); font:800 28px Inter,ui-sans-serif,system-ui,sans-serif; text-anchor:middle; }
    .subtitle{ fill:var(--ekk-muted); font:500 15px Inter,ui-sans-serif,system-ui,sans-serif; text-anchor:middle; }
    .center{ fill:color-mix(in srgb,var(--ekk-accent) 9%,transparent); stroke:color-mix(in srgb,var(--ekk-accent) 34%,transparent); }
    .phase{ opacity:.76; animation: phaseGlow 12s ease-in-out infinite; }
    .phase.p2{animation-delay:2s}.phase.p3{animation-delay:4s}.phase.p4{animation-delay:6s}.phase.p5{animation-delay:8s}.phase.p6{animation-delay:10s}
    @keyframes sweep { 0%{ transform:rotate(-90deg); stroke-dasharray:94 486;} 16%{transform:rotate(-30deg)} 33%{transform:rotate(30deg)} 50%{transform:rotate(90deg)} 66%{transform:rotate(150deg)} 83%{transform:rotate(210deg)} 100%{transform:rotate(270deg)} }
    @keyframes nodePulse { 0%,12%,100%{ r:6; opacity:.45 } 16%,24%{ r:10; opacity:1 } }
    @keyframes phaseGlow { 0%,12%,100%{ opacity:.56 } 16%,24%{ opacity:1 } }
    @media (prefers-reduced-motion: reduce){ *{ animation:none!important; } .ring-active{ transform:rotate(-90deg); } }
  </style>
  <rect class="panel" x="24" y="24" width="852" height="672" rx="32"/>
  <text class="title" x="450" y="84">Ο Κύκλος της Δημοκρατίας</text>
  <text class="subtitle" x="450" y="113">Από το νομοσχέδιο στη δημόσια ψήφο και στο τελικό αποτέλεσμα</text>

  <circle class="ring-base" cx="450" cy="360" r="208"/>
  <circle class="ring-active" cx="450" cy="360" r="208"/>
  <circle class="center" cx="450" cy="360" r="104"/>
  <text class="label" x="450" y="346">Bill Lifecycle</text>
  <text class="small" x="450" y="374">ANNOUNCED → OPEN END</text>
  <text class="small" x="450" y="398">χωρίς νομική δέσμευση</text>

  <g class="phase p1" transform="translate(450 152)"><circle class="node" r="38"/><circle class="node-core" r="7"/><text class="label" y="70">Ανακοίνωση</text><text class="small" y="92">AI σύνοψη</text></g>
  <g class="phase p2" transform="translate(630 256)"><circle class="node" r="38"/><circle class="node-core n2" r="7"/><text class="label" y="70">Ενεργό</text><text class="small" y="92">Ψηφοφορία</text></g>
  <g class="phase p3" transform="translate(630 464)"><circle class="node" r="38"/><circle class="node-core n3" r="7"/><text class="label" y="70">Πολίτες</text><text class="small" y="92">Υπέρ / Κατά</text></g>
  <g class="phase p4" transform="translate(450 568)"><circle class="node" r="38"/><circle class="node-core n4" r="7"/><text class="label" y="70">24ω</text><text class="small" y="92">Παράθυρο</text></g>
  <g class="phase p5" transform="translate(270 464)"><circle class="node" r="38"/><circle class="node-core n5" r="7"/><text class="label" y="70">Βουλή</text><text class="small" y="92">Απόφαση</text></g>
  <g class="phase p6" transform="translate(270 256)"><circle class="node" r="38"/><circle class="node-core n6" r="7"/><text class="label" y="70">Αρχείο</text><text class="small" y="92">Open End</text></g>
</svg>
