<!-- ekklesia.gr Motion Pack v1 — suggested landing snippets -->

<!-- 1) CSS in the document head or static CSS entrypoint -->
<link rel="stylesheet" href="/animations/css/ekklesia-motion.css">

<!-- 2) Hero background -->
<section class="hero ekk-motion-layer">
  <div class="ekk-motion-bg" aria-hidden="true">
    <img src="/animations/svg/hero-pnyx-network.svg" alt="" decoding="async">
  </div>
  <!-- Existing hero content remains unchanged -->
</section>

<!-- 3) How it works -->
<section id="how-it-works" class="ekk-fade-up">
  <!-- Existing section title and four cards remain unchanged -->
  <figure class="ekk-visual-card ekk-visual-frame">
    <img src="/animations/svg/voting-flow.svg"
         alt="Ροή ψήφου: SMS, hash, Ed25519, υπογραφή ψήφου και αποτέλεσμα"
         loading="lazy" decoding="async">
  </figure>
</section>

<!-- 4) Democratic lifecycle -->
<section id="democracy-cycle" class="ekk-fade-up">
  <figure class="ekk-visual-card ekk-visual-frame">
    <img src="/animations/svg/bill-lifecycle-ring.svg"
         alt="Κύκλος Δημοκρατίας: ανακοίνωση, ενεργοποίηση, ψήφος πολιτών, 24ω παράθυρο, απόφαση Βουλής, αρχείο"
         loading="lazy" decoding="async">
  </figure>
</section>

<!-- 5) Divergence -->
<section id="divergence" class="ekk-fade-up">
  <figure class="ekk-visual-card ekk-visual-frame">
    <img src="/animations/svg/divergence-balance.svg"
         alt="Σύγκριση Βουλής και πολιτών με δείκτη απόκλισης"
         loading="lazy" decoding="async">
  </figure>
</section>

<!-- 6) CPLM -->
<section id="cplm" class="ekk-fade-up">
  <figure class="ekk-visual-card ekk-visual-frame">
    <img src="/animations/svg/cplm-compass.svg"
         alt="Πολιτικός Καθρέφτης CPLM σε δύο άξονες: οικονομία και κοινωνία"
         loading="lazy" decoding="async">
  </figure>
</section>

<!-- 7) JS before closing body, only if no existing reveal observer exists -->
<script src="/animations/js/motion-observer.js" defer></script>
