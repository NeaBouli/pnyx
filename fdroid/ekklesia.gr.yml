  NonFreeNet:
    en-US: HLR phone verification uses a commercial API.
Categories:
  - Connectivity
License: MIT
WebSite: https://ekklesia.gr
SourceCode: https://github.com/NeaBouli/pnyx
IssueTracker: https://github.com/NeaBouli/pnyx/issues

AutoName: ekklesia

RepoType: git
Repo: https://github.com/NeaBouli/pnyx

Builds:
  - versionName: 1.0.0
    versionCode: 6
    commit: ccaf8e5a99abc73323f4999ad5e4173342685d4b
    timeout: 20000
    sudo:
      - apt-get update
      - apt-get install -y npm
    output:
      apps/mobile/android/app/build/outputs/apk/directRelease/app-direct-release-unsigned.apk
    prebuild:
      - cd apps/mobile
      - npm ci --ignore-scripts
      - npx expo prebuild --clean --platform android
      - sed -i 's/JavaLanguageVersion.of(17)/JavaLanguageVersion.of(21)/g' android/app/build.gradle
    scandelete:
      - apps/mobile/node_modules
    build:
      - cd apps/mobile/android
      - gradle assembleDirectRelease

AutoUpdateMode: None
UpdateCheckMode: None
CurrentVersion: 1.0.0
CurrentVersionCode: 6
