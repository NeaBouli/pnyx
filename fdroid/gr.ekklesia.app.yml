Name: εκκλησία
AutoName: ekklesia

Summary: Anonymous direct democracy for Greek citizens
Description: |-
  εκκλησία is an open-source platform for anonymous civic participation.

  Vote on real parliamentary bills anonymously using cryptographic
  identity verification (HLR lookup, no SMS OTP). Your phone number
  is never stored — only a cryptographic nullifier hash.

  Features:
  * Vote YES/NO/ABSTAIN on real Hellenic Parliament bills
  * Political Compass (48 questions, 100% local — never leaves device)
  * Divergence Index: compare citizen votes vs parliament decisions
  * 325 municipalities + 13 regions
  * Full anonymity: Ed25519 keypair, zero PII stored

  This is NOT a government app. Votes are informational only.

  Data sources: hellenicparliament.gr, diavgeia.gov.gr, data.gov.gr

AntiFeatures:
